name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claud/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: claud/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test --if-present
      - run: npm run build
        env:
          VITE_USE_MOCK: 'true'

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claud/backend/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest openpyxl boto3
      - name: Run tests
        run: pytest

  sam-validate:
    name: SAM templates validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - run: sam validate --lint -t claud/backend/auth/template.yaml --region us-east-1
      - run: sam validate --lint -t claud/backend/core/template.yaml --region us-east-1
      - run: sam validate --lint -t claud/infra/frontend-template.yaml --region us-east-1
