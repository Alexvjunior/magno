name: CI/CD

on:
  pull_request:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run build
        env:
          VITE_USE_MOCK: 'true'

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/core
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov openpyxl boto3
          pip install -r ../layers/deps-layer/requirements.txt
      - name: Run tests
        run: pytest

  sam-validate:
    name: SAM templates validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - run: sam validate --lint -t backend/auth/template.yaml --region us-east-1
      - run: sam validate --lint -t backend/core/template.yaml --region us-east-1
      - run: sam validate --lint -t infra/frontend-template.yaml --region us-east-1

  deploy-dev:
    name: Deploy dev
    if: ${{ github.event_name != 'pull_request' && github.ref_name == 'dev' }}
    needs: [frontend, backend, sam-validate]
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      STACK_AUTH: ${{ vars.STACK_AUTH_DEV || 'claud-auth-dev' }}
      STACK_CORE: ${{ vars.STACK_CORE_DEV || 'claud-core-dev' }}
      STACK_FRONTEND: ${{ vars.STACK_FRONTEND_DEV || 'claud-frontend-dev' }}
      SAM_ARTIFACT_BUCKET: ${{ vars.SAM_ARTIFACT_BUCKET || 'claud-sam-deploy-572391417849-us-east-1' }}
      APP_NAME: ${{ vars.APP_NAME || 'claud' }}
      ENVIRONMENT: dev
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN_DEV || vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build & publish layers
        id: layers
        run: |
          set -euo pipefail
          (cd backend/layers/deps-layer && bash build.sh)
          DEPS_ARN=$(aws lambda publish-layer-version \
            --layer-name claud-deps \
            --compatible-runtimes python3.12 \
            --zip-file fileb://backend/layers/deps-layer/claud-deps.zip \
            --query 'LayerVersionArn' --output text)
          echo "deps_arn=$DEPS_ARN" >> "$GITHUB_OUTPUT"
          (cd backend/layers/xlsx-layer && bash build.sh)
          XLSX_ARN=$(aws lambda publish-layer-version \
            --layer-name claud-xlsx \
            --compatible-runtimes python3.12 \
            --zip-file fileb://backend/layers/xlsx-layer/claud-xlsx.zip \
            --query 'LayerVersionArn' --output text)
          echo "xlsx_arn=$XLSX_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy auth stack
        run: |
          cd backend/auth
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --stack-name $STACK_AUTH \
            --capabilities CAPABILITY_IAM \
            --s3-bucket $SAM_ARTIFACT_BUCKET \
            --no-resolve-s3 \
            --parameter-overrides Environment=$ENVIRONMENT AppName=$APP_NAME

      - name: Read auth stack outputs
        id: auth
        run: |
          USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_AUTH \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" --output text)
          CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_AUTH \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" --output text)
          echo "user_pool_id=$USER_POOL_ID" >> "$GITHUB_OUTPUT"
          echo "client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy core stack
        env:
          GOOGLE_SERVICE_ACCOUNT_SECRET_ARN: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_SECRET_ARN || vars.GOOGLE_SERVICE_ACCOUNT_SECRET_ARN }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_SECRET_ARN" ]; then
            echo "Missing required GitHub secret or variable: GOOGLE_SERVICE_ACCOUNT_SECRET_ARN"
            exit 1
          fi
          cd backend/core
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --stack-name $STACK_CORE \
            --capabilities CAPABILITY_IAM \
            --s3-bucket $SAM_ARTIFACT_BUCKET \
            --no-resolve-s3 \
            --parameter-overrides \
              Environment=$ENVIRONMENT \
              AppName=$APP_NAME \
              AwsRegion=$AWS_REGION \
              UserPoolId=${{ steps.auth.outputs.user_pool_id }} \
              UserPoolClientId=${{ steps.auth.outputs.client_id }} \
              DepsLayerArn=${{ steps.layers.outputs.deps_arn }} \
              XlsxLayerArn=${{ steps.layers.outputs.xlsx_arn }} \
              GoogleServiceAccountSecretArn=$GOOGLE_SERVICE_ACCOUNT_SECRET_ARN

      - name: Read core API URL
        id: core
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_CORE \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend stack
        run: |
          aws cloudformation deploy \
            --stack-name $STACK_FRONTEND \
            --template-file infra/frontend-template.yaml \
            --parameter-overrides Environment=$ENVIRONMENT AppName=$APP_NAME \
            --no-fail-on-empty-changeset

      - name: Read frontend stack outputs
        id: frontend
        run: |
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name $STACK_FRONTEND \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          CLOUDFRONT_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_FRONTEND \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
          CLOUDFRONT_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name $STACK_FRONTEND \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomainName'].OutputValue" --output text)
          echo "bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$CLOUDFRONT_DIST_ID" >> "$GITHUB_OUTPUT"
          echo "domain_name=$CLOUDFRONT_DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Retire legacy public frontend bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          LEGACY_BUCKET="${APP_NAME}-frontend-${ENVIRONMENT}-${ACCOUNT_ID}"
          if aws s3api head-bucket --bucket "$LEGACY_BUCKET" 2>/dev/null; then
            aws s3api put-public-access-block \
              --bucket "$LEGACY_BUCKET" \
              --public-access-block-configuration \
                BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            aws s3api delete-bucket-policy --bucket "$LEGACY_BUCKET" || true
            echo "Retired legacy public bucket policy for $LEGACY_BUCKET"
          else
            echo "No legacy frontend bucket found at $LEGACY_BUCKET"
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_USE_MOCK: 'false'
          VITE_API_URL: ${{ steps.core.outputs.api_url }}
          VITE_USER_POOL_ID: ${{ steps.auth.outputs.user_pool_id }}
          VITE_USER_POOL_CLIENT_ID: ${{ steps.auth.outputs.client_id }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          npm ci
          npm run build:dev

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist s3://${{ steps.frontend.outputs.bucket }}/ \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache"
          aws s3 sync frontend/dist/assets s3://${{ steps.frontend.outputs.bucket }}/assets/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable"
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.frontend.outputs.distribution_id }} \
            --paths "/*"
          echo "Frontend URL: https://${{ steps.frontend.outputs.domain_name }}"

  deploy-prod:
    name: Deploy prod
    if: ${{ github.event_name != 'pull_request' && github.ref_name == 'main' }}
    needs: [frontend, backend, sam-validate]
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      STACK_AUTH: ${{ vars.STACK_AUTH_PROD || 'claud-auth-prod' }}
      STACK_CORE: ${{ vars.STACK_CORE_PROD || 'claud-core-prod' }}
      STACK_FRONTEND: ${{ vars.STACK_FRONTEND_PROD || 'claud-frontend-prod' }}
      SAM_ARTIFACT_BUCKET: ${{ vars.SAM_ARTIFACT_BUCKET || 'claud-sam-deploy-572391417849-us-east-1' }}
      APP_NAME: ${{ vars.APP_NAME || 'claud' }}
      ENVIRONMENT: prod
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN_PROD || vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build & publish layers
        id: layers
        run: |
          set -euo pipefail
          (cd backend/layers/deps-layer && bash build.sh)
          DEPS_ARN=$(aws lambda publish-layer-version \
            --layer-name claud-deps \
            --compatible-runtimes python3.12 \
            --zip-file fileb://backend/layers/deps-layer/claud-deps.zip \
            --query 'LayerVersionArn' --output text)
          echo "deps_arn=$DEPS_ARN" >> "$GITHUB_OUTPUT"
          (cd backend/layers/xlsx-layer && bash build.sh)
          XLSX_ARN=$(aws lambda publish-layer-version \
            --layer-name claud-xlsx \
            --compatible-runtimes python3.12 \
            --zip-file fileb://backend/layers/xlsx-layer/claud-xlsx.zip \
            --query 'LayerVersionArn' --output text)
          echo "xlsx_arn=$XLSX_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy auth stack
        run: |
          cd backend/auth
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --stack-name $STACK_AUTH \
            --capabilities CAPABILITY_IAM \
            --s3-bucket $SAM_ARTIFACT_BUCKET \
            --no-resolve-s3 \
            --parameter-overrides Environment=$ENVIRONMENT AppName=$APP_NAME

      - name: Read auth stack outputs
        id: auth
        run: |
          USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_AUTH \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" --output text)
          CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_AUTH \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" --output text)
          echo "user_pool_id=$USER_POOL_ID" >> "$GITHUB_OUTPUT"
          echo "client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy core stack
        env:
          GOOGLE_SERVICE_ACCOUNT_SECRET_ARN: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_SECRET_ARN || vars.GOOGLE_SERVICE_ACCOUNT_SECRET_ARN }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_SECRET_ARN" ]; then
            echo "Missing required GitHub secret or variable: GOOGLE_SERVICE_ACCOUNT_SECRET_ARN"
            exit 1
          fi
          cd backend/core
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --stack-name $STACK_CORE \
            --capabilities CAPABILITY_IAM \
            --s3-bucket $SAM_ARTIFACT_BUCKET \
            --no-resolve-s3 \
            --parameter-overrides \
              Environment=$ENVIRONMENT \
              AppName=$APP_NAME \
              AwsRegion=$AWS_REGION \
              UserPoolId=${{ steps.auth.outputs.user_pool_id }} \
              UserPoolClientId=${{ steps.auth.outputs.client_id }} \
              DepsLayerArn=${{ steps.layers.outputs.deps_arn }} \
              XlsxLayerArn=${{ steps.layers.outputs.xlsx_arn }} \
              GoogleServiceAccountSecretArn=$GOOGLE_SERVICE_ACCOUNT_SECRET_ARN

      - name: Read core API URL
        id: core
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_CORE \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend stack
        run: |
          aws cloudformation deploy \
            --stack-name $STACK_FRONTEND \
            --template-file infra/frontend-template.yaml \
            --parameter-overrides Environment=$ENVIRONMENT AppName=$APP_NAME \
            --no-fail-on-empty-changeset

      - name: Read frontend stack outputs
        id: frontend
        run: |
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name $STACK_FRONTEND \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          CLOUDFRONT_DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_FRONTEND \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" --output text)
          CLOUDFRONT_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name $STACK_FRONTEND \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomainName'].OutputValue" --output text)
          echo "bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$CLOUDFRONT_DIST_ID" >> "$GITHUB_OUTPUT"
          echo "domain_name=$CLOUDFRONT_DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Retire legacy public frontend bucket
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          LEGACY_BUCKET="${APP_NAME}-frontend-${ENVIRONMENT}-${ACCOUNT_ID}"
          if aws s3api head-bucket --bucket "$LEGACY_BUCKET" 2>/dev/null; then
            aws s3api put-public-access-block \
              --bucket "$LEGACY_BUCKET" \
              --public-access-block-configuration \
                BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            aws s3api delete-bucket-policy --bucket "$LEGACY_BUCKET" || true
            echo "Retired legacy public bucket policy for $LEGACY_BUCKET"
          else
            echo "No legacy frontend bucket found at $LEGACY_BUCKET"
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_USE_MOCK: 'false'
          VITE_API_URL: ${{ steps.core.outputs.api_url }}
          VITE_USER_POOL_ID: ${{ steps.auth.outputs.user_pool_id }}
          VITE_USER_POOL_CLIENT_ID: ${{ steps.auth.outputs.client_id }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          npm ci
          npm run build:prod

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist s3://${{ steps.frontend.outputs.bucket }}/ \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache"
          aws s3 sync frontend/dist/assets s3://${{ steps.frontend.outputs.bucket }}/assets/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable"
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.frontend.outputs.distribution_id }} \
            --paths "/*"
          echo "Frontend URL: https://${{ steps.frontend.outputs.domain_name }}"
